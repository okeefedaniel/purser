{% extends "notifications/base_email.html" %}
{% block content %}
<h2 style="color: #dc3545;">{{ title }}</h2>
<p>{{ message }}</p>
{% if link %}
<p><a href="{{ link }}" style="display: inline-block; padding: 10px 20px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 5px;">Take Action</a></p>
{% endif %}
{% endblock %}
