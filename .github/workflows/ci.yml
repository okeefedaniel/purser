name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: purser
          POSTGRES_PASSWORD: purser
          POSTGRES_DB: purser_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://purser:purser@localhost:5432/purser_test
      DJANGO_SECRET_KEY: test-secret-key-not-for-production
      DJANGO_DEBUG: 'True'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 coverage

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Full check (warnings only)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Check for missing migrations (project apps only)
        # Scope to project-owned apps. Keel's installed migrations
        # occasionally lag its model definitions across version bumps —
        # that's a keel bug to flag, not a reason to gate this product's
        # CI on it. Tracking: REQUIRES KEEL FIX (auditlog.action enum drift
        # against migration 0013).
        run: python manage.py makemigrations purser_core purser --check --dry-run

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Django system check
        run: python manage.py check

      - name: Django deployment check
        run: python manage.py check --deploy 2>&1 || true

      - name: Run tests with coverage
        run: |
          coverage run manage.py test --verbosity=2
          coverage report --fail-under=50

  security:
    permissions:
      contents: read
      actions: read
    uses: okeefedaniel/keel/.github/workflows/security.yml@v0.19.0
    with:
      python-version: '3.12'
