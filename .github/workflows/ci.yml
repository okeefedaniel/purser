name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: purser
          POSTGRES_PASSWORD: purser
          POSTGRES_DB: purser_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://purser:purser@localhost:5432/purser_test
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_DEBUG: 'True'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage flake8

      - name: Run linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run Django system checks
        run: python manage.py check --deploy 2>&1 || true

      - name: Run tests with coverage
        run: |
          coverage run manage.py test --verbosity=2
          coverage report --show-missing --fail-under=50

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  security:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety bandit

      - name: Check for known vulnerabilities
        continue-on-error: true
        run: safety check --output text 2>&1

      - name: Run security linter
        continue-on-error: true
        run: bandit -r . -x ./venv,./staticfiles,./.github --severity-level medium 2>&1
